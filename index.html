    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #1d4ed8;

            --accent-color: #0f172a;
            --background-color: #f8fafc;
            --surface-color: #ffffff;

            --text-secondary: #475569;
            --border-color: #cbd5e1;

    @layer base {
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            color: var(--text-primary);
            line-height: 1.6;
            background: var(--background-color);
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Helvetica Neue', 'Arial', sans-serif;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
    }

    @layer components {
        .academic-card {
            @apply bg-[var(--surface-color)] border border-[var(--border-color)] rounded-xl p-6 shadow-sm;
        }
        
        .nav-link {
            @apply text-[var(--text-secondary)] hover:text-[var(--primary-color)] px-3 py-2 rounded-md transition-colors;
        }
        
        .section-title {
            @apply text-3xl font-semibold text-[var(--text-primary)] mb-6;
        }
        
        .publication-item {
            @apply border-b border-[var(--border-color)] pb-4 mb-4 last:border-b-0;
        }

        .section-block {
            @apply py-12;
        }

        .content-list {
            @apply space-y-3 text-[var(--text-secondary)];
        }
    }

    @layer utilities {
        .text-gradient {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
